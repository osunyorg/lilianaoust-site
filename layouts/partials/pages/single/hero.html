{{- $title := or .Params.header_text .Title -}}
{{- $description := .Params.summary -}}

<div class="page-hero hero">
  <div class="container">
    {{- if or $description -}}
      <hgroup>
        <h1>{{ safeHTML $title }}</h1>
        {{- if $description -}}
          <p>{{ safeHTML $description }}</p>
        {{- end -}}
      </hgroup>
    {{- else -}}
      <h1>{{ safeHTML $title }}</h1>
    {{- end -}}
  </div>
</div>
