[[cors]]
allowed_origins = "*"
allowed_methods = ["GET", "POST"]
allowed_headers = "*"

[[headers]]
for = ["**/*.woff2", "**/*.woff", "**/*.svg", "**/*.ttf", "**/*.otf", "**/*.eot", "**/*.js", "**/*.css"]
compress = "gzip"
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[headers]]
for = ["**/*.png", "**/*.jpg", "**/*.jpeg", "**/*.gif", "**/*.webp"]
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[redirects]]
from = "/les-enfants-du-don-le-docu/index.html"
to = "/les-enfants-du-don-mmi/"

[[redirects]]
from = "/a-propos/index.html"
to = "/infos/"

[[redirects]]
from = "/series/les-enfants-du-don/index.html"
to = "/les-enfants-du-don-mmi/"

[[redirects]]
from = "/les-enfants-du-don-1/index.html"
to = "/les-enfants-du-don/"

[[redirects]]
from = "/series/les-yeux-de-la-montagne/index.html"
to = "/les-yeux-de-la-montagne/"

